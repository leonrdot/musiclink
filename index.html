<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MusicBridge — Compartilhe musicas entre plataformas</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #18181c;
      --surface2: #222228;
      --border: #2e2e38;
      --accent: #7c3aed;
      --accent-light: #a78bfa;
      --accent-glow: rgba(124, 58, 237, 0.35);
      --text: #f0f0f5;
      --muted: #8888a0;
      --radius: 14px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ---- HEADER ---- */
    header {
      width: 100%;
      padding: 20px 32px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--border);
    }

    .logo-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--accent), #4f46e5);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }

    .logo-icon svg { width: 18px; height: 18px; fill: white; }

    header h1 {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    header h1 span { color: var(--accent-light); }

    /* ---- HERO ---- */
    .hero {
      text-align: center;
      padding: 64px 24px 48px;
      max-width: 640px;
      width: 100%;
    }

    .hero h2 {
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      font-weight: 800;
      line-height: 1.15;
      letter-spacing: -1px;
      margin-bottom: 14px;
    }

    .hero h2 .gradient {
      background: linear-gradient(90deg, var(--accent-light), #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero p {
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.6;
    }

    /* ---- INPUT BOX ---- */
    .input-wrapper {
      width: 100%;
      max-width: 640px;
      padding: 0 24px 48px;
    }

    .input-row {
      display: flex;
      gap: 10px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 8px 8px 16px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-row:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .input-row input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 0.95rem;
      min-width: 0;
    }

    .input-row input::placeholder { color: var(--muted); }

    .btn-search {
      background: linear-gradient(135deg, var(--accent), #4f46e5);
      color: white;
      border: none;
      border-radius: 9px;
      padding: 10px 20px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn-search:hover { opacity: 0.9; }
    .btn-search:active { transform: scale(0.97); }
    .btn-search:disabled { opacity: 0.5; cursor: default; }

    /* ---- STATE MESSAGES ---- */
    #status {
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      padding: 12px 24px;
      display: none;
    }

    #error-msg {
      text-align: center;
      color: #f87171;
      font-size: 0.9rem;
      padding: 12px 24px;
      display: none;
    }

    /* ---- RESULT CARD ---- */
    #result {
      width: 100%;
      max-width: 640px;
      padding: 0 24px 64px;
      display: none;
    }

    .song-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .song-header {
      display: flex;
      gap: 16px;
      padding: 20px;
      border-bottom: 1px solid var(--border);
      align-items: center;
    }

    .song-cover {
      width: 72px; height: 72px;
      border-radius: 8px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--surface2);
    }

    .song-cover-placeholder {
      width: 72px; height: 72px;
      border-radius: 8px;
      background: var(--surface2);
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }

    .song-cover-placeholder svg { width: 28px; height: 28px; fill: var(--muted); }

    .song-info { min-width: 0; }

    .song-title {
      font-size: 1.05rem;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .song-artist {
      color: var(--muted);
      font-size: 0.88rem;
      margin-top: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .song-album {
      color: var(--muted);
      font-size: 0.82rem;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-style: italic;
    }

    .platforms-label {
      padding: 14px 20px 8px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .platforms-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 0 12px 12px;
    }

    .platform-link {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 12px;
      border-radius: 9px;
      text-decoration: none;
      color: var(--text);
      transition: background 0.15s;
      cursor: pointer;
    }

    .platform-link:hover { background: var(--surface2); }

    .platform-icon {
      width: 36px; height: 36px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .platform-icon svg, .platform-icon img {
      width: 20px; height: 20px;
    }

    .platform-name { font-size: 0.93rem; font-weight: 500; flex: 1; }

    .platform-open {
      color: var(--muted);
      font-size: 0.8rem;
    }

    .platform-open svg { width: 14px; height: 14px; fill: var(--muted); }

    /* copy toast */
    .toast {
      position: fixed;
      bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 18px;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 500;
      transition: transform 0.25s ease, opacity 0.25s ease;
      opacity: 0;
      pointer-events: none;
      z-index: 100;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    /* ---- FOOTER ---- */
    footer {
      margin-top: auto;
      padding: 20px 24px;
      color: var(--muted);
      font-size: 0.78rem;
      text-align: center;
      border-top: 1px solid var(--border);
      width: 100%;
    }

    footer a { color: var(--muted); }
  </style>
</head>
<body>

  <header>
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M12 3a9 9 0 1 0 0 18A9 9 0 0 0 12 3zm0 2a7 7 0 1 1 0 14A7 7 0 0 1 12 5zm-1 3v5.586l3.707 3.707-1.414 1.414L9 15.414V8h2z"/></svg>
    </div>
    <h1>Music<span>Bridge</span></h1>
  </header>

  <div class="hero">
    <h2>Compartilhe musicas em <span class="gradient">qualquer plataforma</span></h2>
    <p>Cole o link de uma musica do Spotify, Apple Music, YouTube Music, Deezer e mais — receba links para todos os servicos de uma so vez.</p>
  </div>

  <div class="input-wrapper">
    <div class="input-row">
      <input
        type="url"
        id="link-input"
        placeholder="Cole o link da musica aqui..."
        autocomplete="off"
        spellcheck="false"
      />
      <button class="btn-search" id="search-btn" onclick="search()">Buscar</button>
    </div>
  </div>

  <div id="status"></div>
  <div id="error-msg"></div>

  <div id="result">
    <div class="song-card">
      <div class="song-header">
        <div id="cover-wrap"></div>
        <div class="song-info">
          <div class="song-title" id="song-title"></div>
          <div class="song-artist" id="song-artist"></div>
          <div class="song-album" id="song-album"></div>
        </div>
      </div>
      <div class="platforms-label">Disponivel em</div>
      <div class="platforms-list" id="platforms-list"></div>
    </div>
  </div>

  <div class="toast" id="toast">Link copiado!</div>

  <footer>
    Links via <a href="https://odesli.co" target="_blank" rel="noopener">Odesli</a> &middot; MusicBridge
  </footer>

<script>
  const PLATFORMS = {

    youtubeMusic:  { name: "YouTube Music",  color: "#FF0000", bg: "#3a1212", icon: youtubeMusicIcon },
    youtube:       { name: "YouTube",        color: "#FF0000", bg: "#3a1212", icon: youtubeIcon },
    deezer:        { name: "Deezer",         color: "#a238ff", bg: "#29133a", icon: deezerIcon },
    tidal:         { name: "Tidal",          color: "#00FECC", bg: "#0a2e28", icon: tidalIcon },
    amazonMusic:   { name: "Amazon Music",   color: "#00A8E1", bg: "#0a2535", icon: amazonIcon },

    pandora:       { name: "Pandora",        color: "#00A0EE", bg: "#0a2535", icon: pandoraIcon },
    napster:       { name: "Napster",        color: "#09bcd4", bg: "#0a282e", icon: defaultIcon },
    yandex:        { name: "Yandex Music",   color: "#FFCC00", bg: "#30280a", icon: defaultIcon },
    audiomack:     { name: "Audiomack",      color: "#FFA800", bg: "#30220a", icon: defaultIcon },
    anghami:       { name: "Anghami",        color: "#6B4FBB", bg: "#221535", icon: defaultIcon },

  function pandoraIcon(color) {
    return `<svg viewBox="0 0 24 24" fill="${color}"><path d="M0 0v24h8.222c5.217 0 9.547-4.342 9.547-9.547 0-3.526-1.898-6.596-4.733-8.298H24V0H0zm8.333 16.73H4.267V7.27h4.066c2.536 0 4.6 2.115 4.6 4.73s-2.064 4.73-4.6 4.73z"/></svg>`;
  }

  function defaultIcon(color) {
    return `<svg viewBox="0 0 24 24" fill="${color}"><path d="M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2zm1 14.93V16a1 1 0 0 0-2 0v.93A8.001 8.001 0 0 1 4.07 11H5a1 1 0 0 0 0-2h-.93A8.001 8.001 0 0 1 11 2.07V3a1 1 0 0 0 2 0v-.93A8.001 8.001 0 0 1 19.93 9H19a1 1 0 0 0 0 2h.93A8.001 8.001 0 0 1 13 16.93zM12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8zm0 6a2 2 0 1 1 0-4 2 2 0 0 1 0 4z"/></svg>`;
  }

  // ---- MAIN LOGIC ----

  const input = document.getElementById("link-input");
  const searchBtn = document.getElementById("search-btn");
  const statusEl = document.getElementById("status");
  const errorEl = document.getElementById("error-msg");
  const resultEl = document.getElementById("result");
  const toastEl = document.getElementById("toast");

  input.addEventListener("keydown", e => { if (e.key === "Enter") search(); });

  function setStatus(msg) {
    statusEl.innerHTML = msg;
    statusEl.style.display = msg ? "block" : "none";
    errorEl.style.display = "none";
  }

  function setError(msg) {
    errorEl.textContent = msg;
    errorEl.style.display = msg ? "block" : "none";
    statusEl.style.display = "none";
  }

  function showResult() {
    resultEl.style.display = "block";
  }

  function hideResult() {
    resultEl.style.display = "none";
  }

  async function search() {
    const url = input.value.trim();
    if (!url) return;

    hideResult();
    setError("");
    setStatus(`<span class="spinner"></span> Buscando links...`);
    searchBtn.disabled = true;

    try {
      const apiUrl = `https://api.song.link/v1-alpha.1/links?url=${encodeURIComponent(url)}&userCountry=BR`;
      const res = await fetch(apiUrl);

      if (!res.ok) {
        if (res.status === 400) throw new Error("Link invalido ou nao reconhecido. Tente um link do Spotify, Apple Music, Deezer, etc.");
        if (res.status === 404) throw new Error("Musica nao encontrada. Verifique o link e tente novamente.");
        throw new Error(`Erro na busca (${res.status}). Tente novamente em instantes.`);
      }

      const data = await res.json();
      renderResult(data);
      setStatus("");
    } catch (e) {
      setError(e.message || "Erro inesperado. Tente novamente.");
    } finally {
      searchBtn.disabled = false;
    }
  }

  function renderResult(data) {
    // Pega metadados de qualquer entidade disponivel
    const entities = Object.values(data.entitiesByUniqueId || {});
    const entity = entities.find(e => e.title) || entities[0] || {};

    const title = entity.title || "Titulo desconhecido";
    const artist = entity.artistName || "";
    const album = entity.albumName || "";
    const thumbnailUrl = entity.thumbnailUrl || "";

    document.getElementById("song-title").textContent = title;
    document.getElementById("song-artist").textContent = artist;
    document.getElementById("song-album").textContent = album;

    const coverWrap = document.getElementById("cover-wrap");
    if (thumbnailUrl) {
      coverWrap.innerHTML = `<img class="song-cover" src="${thumbnailUrl}" alt="Capa do album" onerror="this.parentNode.innerHTML='<div class=song-cover-placeholder>${musicNoteHTML()}</div>'" />`;
    } else {
      coverWrap.innerHTML = `<div class="song-cover-placeholder">${musicNoteHTML()}</div>`;
    }

    const list = document.getElementById("platforms-list");
    list.innerHTML = "";

    const linksByPlatform = data.linksByPlatform || {};
    const order = ["spotify","appleMusic","youtubeMusic","youtube","deezer","tidal","amazonMusic","soundcloud","pandora","napster","yandex","audiomack","anghami","boomplay"];

    // Ordena: primeiro os conhecidos na ordem definida, depois os desconhecidos
    const keys = [
      ...order.filter(k => linksByPlatform[k]),
      ...Object.keys(linksByPlatform).filter(k => !order.includes(k))
    ];

    if (keys.length === 0) {
      list.innerHTML = `<p style="color:var(--muted);padding:12px 12px;font-size:0.88rem;">Nenhuma plataforma encontrada para esta musica.</p>`;
    }

    for (const key of keys) {
      const pData = PLATFORMS[key] || { name: key, color: "#888", bg: "#222", icon: defaultIcon };
      const link = linksByPlatform[key]?.url || "#";

      const item = document.createElement("a");
      item.href = link;
      item.target = "_blank";
      item.rel = "noopener noreferrer";
      item.className = "platform-link";
      item.innerHTML = `
        <div class="platform-icon" style="background:${pData.bg}">
          ${pData.icon(pData.color)}
        </div>
        <span class="platform-name">${pData.name}</span>
        <span class="platform-open">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M14 3h7v7h-2V6.41l-9.29 9.3-1.42-1.42L17.59 5H14V3zM5 5h4V3H3v18h18v-6h-2v4H5V5z"/></svg>
        </span>
      `;

      // Long press / right click hint: copy link
      item.addEventListener("contextmenu", e => {
        e.preventDefault();
        navigator.clipboard.writeText(link).then(() => showToast("Link copiado!"));
      });

      list.appendChild(item);
    }

    showResult();
  }

  function musicNoteHTML() {
    return `<svg viewBox="0 0 24 24"><path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/></svg>`;
  }

  let toastTimeout;
  function showToast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    clearTimeout(toastTimeout);
    toastTimeout = setTimeout(() => toastEl.classList.remove("show"), 2200);
  }
</script>
</body>
</html>
